<!DOCTYPE html>
<title>API Tests</title>
<meta charset="utf-8">
<link rel="shortcut icon" href="../favicon.svg">
<link rel="stylesheet" href="../site.css?update=2022-09-10T10:37:44">
<script type="module" src="ApiTest.js?update=2026-04-01T13:40:25"></script>

<style>
#progress
{
    position: relative;
    display: inline-block;
    vertical-align: bottom;
    border: solid 1px black;
    width: 300px;
    height: 20px;
}
#progress_label
{
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    display: inline-block;
    text-align: center;
    z-index: 1;
}
#progress_meter
{
    position: absolute;
    left: 0;
    top: 0;
    display: inline-block;
    width: 50%;
    height: 100%;
    background-color: #00ff00;
    text-align: center;
}

#results
{
    margin: 20px;
}

#summary
{
    padding: 15px;
    border: solid 1px black;
}
.test { margin: 4px; }
.pass { background-color: rgba(0, 255, 0, 0.3); }
.fail { background-color: rgba(255, 0, 0, 0.3); }
</style>

<h1>The Traveller Map - API Tests</h1>
<div class="content">
  <section id="summary">
    <h2 style="margin:0">Summary</h2>
    <table>
    <tr><td>Progress: </td><td><span id="progress"><span id="progress_label"></span><span id="progress_meter">&nbsp;</span></span></td></tr>
    <tr><td>Total Tests: </td><td id="tests_total"></td></tr>
    <tr><td>Run:</td><td id="tests_run"></td></tr>
    <tr><td>Passed:</td><td id="tests_passed"></td></tr>
    <tr><td>Failed:</td><td id="tests_failed"></td></tr>
    </table>
  </section>
  <section id="results">
    <h2>Tests:</h2>
  </section>
</div>
